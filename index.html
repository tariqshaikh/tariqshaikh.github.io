<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tariq Shaikh's Portfolio</title>
    <meta name="description" content="Product Manager bridging data, strategy, and product." />
    <meta property="og:title" content="Tariq Shaikh's Portfolio" />
    <meta property="og:description" content="Product Manager bridging data, strategy, and product." />
    <meta property="og:type" content="website" />
    <script type="text/javascript">
      // This script handles the redirect from 404.html
      (function(l) {
        if (l.search[1] === '/' || l.search.slice(1, 3) === 'p=') {
          var query = l.search[1] === '/' ? l.search.slice(1) : l.search.slice(3);
          var decoded = query.split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.replace(/\/$/, '') + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
